<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeevan Rakshak AI</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:#111;
}

.container {
  width:90%;
  max-width:400px;
  padding:20px;
  border-radius:20px;
  background:#2c2c2c;
  color:white;
  text-align:center;
}

textarea {
  width:100%;
  height:100px;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  color:white;
  font-size:15px;
  cursor:pointer;
}

.analyze {background:red;}
.speak {background:green;}
.map {background:blue;}

#resultBox {
  margin-top:15px;
  padding:10px;
  border-radius:10px;
  background:#444;
  text-align:left;
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h2>🚑 Jeevan Rakshak AI</h2>

<select id="lang">
<option value="en">English</option>
<option value="hi">हिंदी</option>
<option value="gu">ગુજરાતી</option>
</select>

<p id="label">Enter your symptoms:</p>

<textarea id="symptoms" placeholder="fever, chest pain..."></textarea>

<button class="analyze" onclick="analyze()">🔍 Analyze</button>
<button class="speak" onclick="speak()">🎤 Speak</button>
<button class="map" onclick="openMap()">🏥 Nearby Hospital</button>

<div id="resultBox"></div>

</div>

<script>

/* ANALYZE FUNCTION */
async function analyze(){

let s = document.getElementById("symptoms").value;
let lang = document.getElementById("lang").value;

if(!s){
alert("Enter symptoms");
return;
}

try {

let res = await fetch("https://jeevanrakshakai.onrender.com/analyze", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
symptoms: s,
lang: lang
})
});

let data = await res.json();

/* DISPLAY RESULT */
document.getElementById("resultBox").innerHTML =
"<b>" + data.level + "</b><br><br>" + data.advice;

} catch(err){
alert("Server error");
}

}


/* SPEAK FUNCTION */
function speak(){

let text = document.getElementById("resultBox").innerText;
let lang = document.getElementById("lang").value;

if(!text){
alert("No result to speak");
return;
}

let speech = new SpeechSynthesisUtterance(text);

if(lang === "hi") speech.lang = "hi-IN";
else if(lang === "gu") speech.lang = "gu-IN";
else speech.lang = "en-IN";

window.speechSynthesis.speak(speech);

}


/* GOOGLE MAP */
function openMap(){
window.open("https://www.google.com/maps/search/hospital+near+me");
}


/* LABEL CHANGE */
document.getElementById("lang").addEventListener("change", function(){

let l = this.value;
let label = document.getElementById("label");

if(l === "hi") label.innerText = "अपने लक्षण लिखें:";
else if(l === "gu") label.innerText = "તમારા લક્ષણો લખો:";
else label.innerText = "Enter your symptoms:";

});

</script>

</body>
</html>
