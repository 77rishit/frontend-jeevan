<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚑 Jeevan Rakshak AI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: 1s;
  z-index: -2;
}

.overlay {
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 600px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  text-align: center;
  color: white;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

select, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  border: none;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  cursor: pointer;
}

.analyze { background: #ff4b2b; color: white; }
.voice { background: #28a745; color: white; }
.map { background: #007bff; color: white; }

#loader {
  display: none;
  margin-top: 10px;
}

#resultBox {
  margin-top: 15px;
  padding: 15px;
  border-radius: 10px;
  background: rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="overlay">
  <div class="container">

    <h1>🚑 Jeevan Rakshak AI</h1>

    <select id="lang">
      <option value="en">English</option>
      <option value="hi">हिंदी</option>
      <option value="gu">ગુજરાતી</option>
    </select>

    <p id="label">Enter your symptoms:</p>

    <textarea id="symptoms" placeholder="e.g. fever, chest pain"></textarea>

    <button class="analyze" onclick="analyze()">🔍 Analyze</button>
    <button class="voice" onclick="startVoice()">🎤 Speak</button>
    <button class="map" onclick="openMap()">🏥 Nearby Hospital</button>

    <div id="loader">⏳ Processing...</div>

    <div id="resultBox"></div>

  </div>
</div>

<script>
// Background animation
const images = [
  "https://picsum.photos/1920/1080?1",
  "https://picsum.photos/1920/1080?2",
  "https://picsum.photos/1920/1080?3",
  "https://picsum.photos/1920/1080?4"
];

let index = 0;
function changeBackground() {
  document.getElementById("bg").style.backgroundImage = `url(${images[index]})`;
  index = (index + 1) % images.length;
}
setInterval(changeBackground, 5000);
changeBackground();

// Language label
const text = {
  en: "Enter your symptoms:",
  hi: "अपने लक्षण लिखें:",
  gu: "તમારા લક્ષણો લખો:"
};

document.getElementById("lang").addEventListener("change", function() {
  document.getElementById("label").innerText = text[this.value];
});

// Voice output
function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);
  let lang = document.getElementById("lang").value;

  if (lang === "hi") speech.lang = "hi-IN";
  else if (lang === "gu") speech.lang = "gu-IN";
  else speech.lang = "en-IN";

  window.speechSynthesis.speak(speech);
}

// Voice input
function startVoice() {
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-IN";

  recognition.onresult = function(e) {
    document.getElementById("symptoms").value = e.results[0][0].transcript;
  };

  recognition.start();
}

// Map
function openMap() {
  window.open("https://www.google.com/maps/search/hospital+near+me");
}

// Translation
function translate(text, lang) {
  const translations = {
    "Consult a doctor soon. Monitor symptoms and take rest.": {
      hi: "जल्दी डॉक्टर से मिलें। लक्षणों पर ध्यान दें और आराम करें।",
      gu: "જલ્દી ડોક્ટરને મળો. લક્ષણો પર ધ્યાન આપો અને આરામ કરો."
    },
    "Immediate medical attention required!": {
      hi: "तुरंत चिकित्सा सहायता की आवश्यकता है!",
      gu: "તાત્કાલિક સારવાર જરૂરી છે!"
    },
    "Take rest and stay hydrated.": {
      hi: "आराम करें और पानी पीते रहें।",
      gu: "આરામ કરો અને પાણી પીતા રહો."
    }
  };

  return translations[text]?.[lang] || text;
}

// ✅ FIXED ANALYZE FUNCTION
async function analyze() {
  let symptoms = document.getElementById("symptoms").value;

  if (!symptoms) {
    alert("Enter symptoms");
    return;
  }

  let loader = document.getElementById("loader");
  let box = document.getElementById("resultBox");

  loader.style.display = "block";
box.innerHTML =
  "<b>" + levelText + ":</b> " + data.level +
  "<br><br>" +
  translatedAdvice.replace(/\n/g, "<br>");
  try {
    const response = await fetch("https://jeevanrakshakai.onrender.com/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ symptoms })
    });

    const data = await response.json();

    loader.style.display = "none";

    if (data.level.includes("Critical")) {
      box.style.background = "red";
    } else if (data.level.includes("Moderate")) {
      box.style.background = "orange";
    } else {
      box.style.background = "green";
    }

    let lang = document.getElementById("lang").value;

let translatedAdvice = data.advice;
    let levelText = "Level";
    let adviceText = "Advice";

    if (lang === "hi") {
      levelText = "स्तर";
      adviceText = "सलाह";
    }
    if (lang === "gu") {
      levelText = "સ્તર";
      adviceText = "સલાહ";
    }

    box.innerHTML =
      "<b>" + levelText + ":</b> " + data.level +
      "<br><b>" + adviceText + ":</b> " + translatedAdvice;

    // SAFE SPEAK (no crash)
    try {
      speak(translatedAdvice);
    } catch (e) {
      console.log("Speech error");
    }

  } catch (error) {
    loader.style.display = "none";
    box.innerHTML = "⚠️ Server not responding. Try again.";
  }
}
</script>

</body>
</html>
