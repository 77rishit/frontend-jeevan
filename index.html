<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚑 Jeevan Rakshak AI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
}

/* Background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: background-image 1s ease-in-out;
  z-index: -2;
}

/* Overlay */
.overlay {
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Container */
.container {
  width: 100%;
  max-width: 600px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  text-align: center;
  color: white;
}

/* Heading */
h1 {
  font-size: 28px;
  margin-bottom: 15px;
}

/* Dropdown */
select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* Input */
textarea {
  width: 100%;
  height: 100px;
  border-radius: 10px;
  padding: 10px;
  font-size: 14px;
}

/* Buttons */
button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  cursor: pointer;
}

.analyze { background: #ff4b2b; color: white; }
.voice { background: #28a745; color: white; }
.map { background: #007bff; color: white; }

/* Result */
#resultBox {
  margin-top: 15px;
  padding: 15px;
  border-radius: 10px;
  background: rgba(0,0,0,0.7);
  font-size: 16px;
}

/* 💻 Desktop improvements */
@media (min-width: 768px) {
  h1 { font-size: 36px; }
  textarea { height: 120px; font-size: 16px; }
  button { font-size: 16px; }
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="overlay">
  <div class="container">

    <h1>🚑 Jeevan Rakshak AI</h1>

    <select id="lang">
      <option value="en">English</option>
      <option value="hi">हिंदी</option>
      <option value="gu">ગુજરાતી</option>
    </select>

    <p id="label">Enter your symptoms:</p>

    <textarea id="symptoms" placeholder="e.g. fever, chest pain"></textarea>

    <button class="analyze" onclick="analyze()">🔍 Analyze</button>
    <button class="voice" onclick="startVoice()">🎤 Speak</button>
    <button class="map" onclick="openMap()">🏥 Nearby Hospital</button>
<div id="loader" style="display:none; margin-top:10px; font-size:16px;">
  ⏳ Processing...
</div>

    <div id="resultBox"></div>

  </div>
</div>

<script>
// Background images
const images = [
  "https://picsum.photos/1920/1080?1",
  "https://picsum.photos/1920/1080?2",
  "https://picsum.photos/1920/1080?3",
  "https://picsum.photos/1920/1080?4"
];

let index = 0;

function changeBackground() {
  document.getElementById("bg").style.backgroundImage =
    `url(${images[index]})`;
  index = (index + 1) % images.length;
}

setInterval(changeBackground, 5000);
changeBackground();

// Language
const text = {
  en: "Enter your symptoms:",
  hi: "अपने लक्षण लिखें:",
  gu: "તમારા લક્ષણો લખો:"
};

document.getElementById("lang").addEventListener("change", function() {
  document.getElementById("label").innerText = text[this.value];
});

// Analyze
async function analyze() {
  let symptoms = document.getElementById("symptoms").value;

  if (!symptoms) {
    alert("Enter symptoms");
    return;
  }

  // 🔄 Show loader
  document.getElementById("loader").style.display = "block";

  try {
    let response = await fetch("https://jeevanrakshakai.onrender.com/analyze", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ symptoms })
    });

    let data = await response.json();

    // ❌ Hide loader
    document.getElementById("loader").style.display = "none";

    let box = document.getElementById("resultBox");

    // 🎨 Dynamic color
    if (data.level.includes("Critical")) {
      box.style.background = "red";
    } else if (data.level.includes("Moderate")) {
      box.style.background = "orange";
    } else {
      box.style.background = "green";
    }

    // 🧾 Show result
    box.innerHTML =
      "<b>Level:</b> " + data.level + "<br><b>Advice:</b> " + data.advice;

    // 🔊 Speak result
    speak(data.advice);

  } catch (error) {
    document.getElementById("loader").style.display = "none";
    alert("Server error");
    console.log(error);
  }
}

// Map
function openMap() {
  window.open("https://www.google.com/maps/search/hospital+near+me");
}
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
