<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeevan Rakshak AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  background-size: cover;
  background-position: center;
  transition: background-image 1s ease-in-out;
}

.container {
  width: 90%;
  max-width: 400px;
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.5);
  text-align: center;
}

textarea {
  width: 100%;
  height: 100px;
  border-radius: 10px;
  padding: 10px;
  border: none;
  margin-top: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.analyze { background: #ff3b30; color: white; }
.speak { background: #34c759; color: white; }
.map { background: #007aff; color: white; }

#resultBox {
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  text-align: left;
}

#loader {
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <h2>🚑 Jeevan Rakshak AI</h2>

  <select id="lang">
    <option value="en">English</option>
    <option value="hi">हिंदी</option>
    <option value="gu">ગુજરાતી</option>
  </select>

  <p id="label">Enter your symptoms:</p>

  <textarea id="symptoms" placeholder="e.g. fever, headache"></textarea>

  <button class="analyze" onclick="analyze()">🔍 Analyze</button>
  <button class="speak" onclick="startVoice()">🎤 Speak</button>
  <button class="map" onclick="openMap()">🏥 Nearby Hospital</button>

  <div id="loader">⏳ Processing...</div>
  <div id="resultBox"></div>
</div>

<script>
// 🌄 Background images rotation
const images = [
  "https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
  "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
  "https://images.unsplash.com/photo-1470770841072-f978cf4d019e"
];

let i = 0;
setInterval(() => {
  document.body.style.backgroundImage = `url(${images[i]})`;
  i = (i + 1) % images.length;
}, 5000);

// 🎤 Voice input
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-IN";
  recognition.start();

  recognition.onresult = function(event) {
    document.getElementById("symptoms").value = event.results[0][0].transcript;
  };
}

// 🏥 Map
function openMap() {
  window.open("https://www.google.com/maps/search/hospitals+near+me");
}

// 🔍 MAIN ANALYZE FUNCTION (FIXED)
async function analyze() {

  let symptoms = document.getElementById("symptoms").value;

  if (!symptoms) {
    alert("Enter symptoms");
    return;
  }

  let loader = document.getElementById("loader");
  let box = document.getElementById("resultBox");

  loader.style.display = "block";
  box.innerHTML = "";

  try {
    const response = await fetch("https://jeevanrakshakai.onrender.com/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ symptoms })
    });

    const data = await response.json();

    loader.style.display = "none";

    // 🎨 Color based on severity
    if (data.level.includes("Critical")) {
      box.style.background = "red";
    } else if (data.level.includes("Moderate")) {
      box.style.background = "orange";
    } else {
      box.style.background = "green";
    }

    // 🌐 Language labels only (NOT translating big text)
    let lang = document.getElementById("lang").value;

    let levelText = "Level";
    if (lang === "hi") levelText = "स्तर";
    if (lang === "gu") levelText = "સ્તર";

    // ✅ FINAL FIX (SHOW FULL PRESCRIPTION)
    box.innerHTML =
      "<b>" + levelText + ":</b> " + data.level +
      "<div style='margin-top:10px'>" +
      data.advice.replace(/\n/g, "<br>") +
      "</div>";

  } catch (error) {
    loader.style.display = "none";
    alert("Server error");
  }
}
</script>

</body>
</html>
