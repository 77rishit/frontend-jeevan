<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🚑 Jeevan Rakshak AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff4e50, #f9d423);
      color: white;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 40px;
    }

    textarea {
      width: 300px;
      height: 100px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background-color: #000;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #333;
    }

    #resultBox {
      margin-top: 30px;
      font-size: 20px;
      background: rgba(0,0,0,0.5);
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
    }
  </style>
</head>

<body>

  <h1>🚑 Emergency AI Assistant</h1>

  <p>Enter your symptoms:</p>

  <textarea id="symptoms" placeholder="e.g. fever, chest pain"></textarea><br>

  <button onclick="analyze()">Check Emergency</button>

  <div id="resultBox"></div>

  <!-- ✅ FINAL WORKING SCRIPT -->
  <script>
    async function analyze() {
      let symptoms = document.getElementById("symptoms").value;

      if (!symptoms) {
        alert("Please enter symptoms");
        return;
      }

      try {
        let response = await fetch("https://jeevanrakshakai.onrender.com/analyze", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ symptoms: symptoms })
        });

        let data = await response.json();

        document.getElementById("resultBox").innerHTML =
          "<b>Level:</b> " + data.level + "<br><b>Advice:</b> " + data.advice;

      } catch (error) {
        alert("Server not responding");
        console.log(error);
      }
    }
  </script>

</body>
</html>
