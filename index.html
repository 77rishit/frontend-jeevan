<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚑 Jeevan Rakshak AI</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 0;
  text-align: center;
  color: white;
  background: url('https://images.unsplash.com/photo-1588776814546-ec7e3f7f9e1b') no-repeat center/cover;
}

.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding: 30px;
}

h1 {
  font-size: 40px;
}

textarea {
  width: 80%;
  max-width: 400px;
  height: 100px;
  border-radius: 10px;
  padding: 10px;
  font-size: 16px;
}

button {
  margin: 10px;
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.analyze { background: red; color: white; }
.voice { background: green; color: white; }
.map { background: blue; color: white; }

#resultBox {
  margin-top: 20px;
  font-size: 20px;
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 15px;
  display: inline-block;
}

select {
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="overlay">

<h1>🚑 Jeevan Rakshak AI</h1>

<select id="lang">
  <option value="en">English</option>
  <option value="hi">हिंदी</option>
  <option value="gu">ગુજરાતી</option>
</select>

<p id="label">Enter your symptoms:</p>

<textarea id="symptoms" placeholder="e.g. fever, chest pain"></textarea><br>

<button class="analyze" onclick="analyze()">Check Emergency</button>
<button class="voice" onclick="startVoice()">🎤 Speak</button>
<button class="map" onclick="openMap()">🏥 Nearby Hospital</button>

<div id="resultBox"></div>

</div>

<script>
// 🌍 Language Text
const text = {
  en: {
    label: "Enter your symptoms:",
    alert: "Please enter symptoms",
    error: "Server error"
  },
  hi: {
    label: "अपने लक्षण लिखें:",
    alert: "लक्षण दर्ज करें",
    error: "सर्वर त्रुटि"
  },
  gu: {
    label: "તમારા લક્ષણો લખો:",
    alert: "લક્ષણો દાખલ કરો",
    error: "સર્વર ભૂલ"
  }
};

// 🌍 Change Language
document.getElementById("lang").addEventListener("change", function() {
  let lang = this.value;
  document.getElementById("label").innerText = text[lang].label;
});

// 🚀 Analyze Function
async function analyze() {
  let symptoms = document.getElementById("symptoms").value;
  let lang = document.getElementById("lang").value;

  if (!symptoms) {
    alert(text[lang].alert);
    return;
  }

  try {
    let response = await fetch("https://jeevanrakshakai.onrender.com/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ symptoms })
    });

    let data = await response.json();

    document.getElementById("resultBox").innerHTML =
      "<b>Level:</b> " + data.level + "<br><b>Advice:</b> " + data.advice;

  } catch (error) {
    alert(text[lang].error);
    console.log(error);
  }
}

// 🎤 Voice Input
function startVoice() {
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    document.getElementById("symptoms").value = event.results[0][0].transcript;
  };

  recognition.start();
}

// 🏥 Open Map
function openMap() {
  window.open("https://www.google.com/maps/search/hospital+near+me");
}
</script>

</body>
</html>
